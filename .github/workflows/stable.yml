name: Release CI

on: workflow_dispatch

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      versionCode: ${{ steps.versioncode.outputs.versionCode }}
      versionName: ${{ steps.versionname.outputs.versionName }}
    steps:
      - uses: actions/checkout@v6
      - name: Get versionCode
        id: versioncode
        run: echo "versionCode=$(grep -E '^\s+versionCode\s*=' app/build.gradle.kts | awk '{ print $3 }' | head -n 1)" >> $GITHUB_OUTPUT
      - name: Get versionName
        id: versionname
        run: echo "versionName=$(grep -E '^\s+versionName\s*=' app/build.gradle.kts | head -1 | awk -F\" '{ print $2 }')" >> $GITHUB_OUTPUT

  build_offline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [Arm64-v8a, Armeabi-v7a, X86_64, X86, Universal]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Fix permissions
        run: chmod +x ./gradlew
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Enable offline mode
        run: echo "OFFLINE=true" >> ./app.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Release APK
        run: ./gradlew --build-cache :app:assemble${{ matrix.arch }}NoMLRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: actions/upload-artifact@v5
        with:
          name: offline-${{ matrix.arch }}
          path: app/build/outputs/apk-renamed/**/*.apk

  build_withml:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [Arm64-v8a, Armeabi-v7a, X86_64, X86, Universal]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Fix permissions
        run: chmod +x ./gradlew
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Enable offline mode
        run: echo "OFFLINE=true" >> ./app.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Release APK
        run: ./gradlew --build-cache :app:assemble${{ matrix.arch }}WithMLRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: actions/upload-artifact@v5
        with:
          name: withml-${{ matrix.arch }}
          path: app/build/outputs/apk-renamed/**/*.apk

  build_maps:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        arch: [Arm64-v8a, Armeabi-v7a, X86_64, X86, Universal]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Fix permissions
        run: chmod +x ./gradlew
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Release APK
        run: ./gradlew --build-cache :app:assemble${{ matrix.arch }}NoMLRelease
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: actions/upload-artifact@v5
        with:
          name: maps-${{ matrix.arch }}
          path: app/build/outputs/apk-renamed/**/*.apk

  build_gplay:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6
      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/powershell || true
      - name: Fix permissions
        run: chmod +x ./gradlew
      - name: Tune Gradle for CI
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties
      - name: Decode Keystore
        id: decode_keystore
        uses: timheuer/base64-to-file@v1
        with:
          fileName: 'release_key.jks'
          fileDir: 'app/'
          encodedString: ${{ secrets.SIGNING_KEY }}
      - name: Build Google Play Bundle
        run: ./gradlew --build-cache :app:bundleUniversalWithMLGplay
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      - uses: r0adkll/upload-google-play@v1
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: com.dot.gallery.gplay
          releaseFiles: app/build/outputs/bundle/universalWithMLGplay/*.aab
          track: production
          releaseName: ${{ needs.prepare.outputs.versionName }}-${{ needs.prepare.outputs.versionCode }} Release
          mappingFile: app/build/outputs/mapping/universalWithMLGplay/mapping.txt
          debugSymbols: app/build/intermediates/merged_native_libs/universalWithMLGplay/mergeUniversalWithMLGplayNativeLibs/out/lib
      - uses: actions/upload-artifact@v5
        with:
          name: ReFra Release (GPlay Bundle)
          path: app/build/outputs/bundle/universalWithMLGplay/*.aab

  release:
    needs: [prepare, build_offline, build_withml, build_maps]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VERSION: ${{ needs.prepare.outputs.versionName }}-${{ needs.prepare.outputs.versionCode }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/RELEASE_BODY.md
            .github/VARIANT_INFO.md
          sparse-checkout-cone-mode: false
      - uses: actions/download-artifact@v5
        with:
          pattern: offline-*
          path: artifacts/offline
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          pattern: maps-*
          path: artifacts/maps
          merge-multiple: true
      - uses: actions/download-artifact@v5
        with:
          pattern: withml-*
          path: artifacts/withml
          merge-multiple: true
      - name: List downloaded artifacts
        run: find artifacts -name "*.apk" -type f | sort
      - name: Generate changelog
        run: |
          generate_table() {
            local dir="$1" tag="$2"
            echo "| Architecture | Download | SHA256 |"
            echo "|:---|:---|:---|"
            find "$dir" -name "*.apk" -type f | sort | while IFS= read -r apk; do
              local name hash url arch
              name=$(basename "$apk")
              hash=$(sha256sum "$apk" | awk '{print $1}')
              url="https://github.com/IacobIonut01/ReFra/releases/download/${tag}/${name}"
              case "$name" in
                *-arm64-v8a-release.apk) arch="arm64-v8a" ;;
                *-armeabi-v7a-release.apk) arch="armeabi-v7a" ;;
                *-x86_64-release.apk) arch="x86_64" ;;
                *-x86-release.apk) arch="x86" ;;
                *-universal-release.apk) arch="Universal" ;;
                *) arch="Unknown" ;;
              esac
              echo "| ${arch} | [Click Here](${url}) | \`${hash}\` |"
            done
          }

          recommend_table() {
            local dir="$1" tag="$2"
            local apk name hash url
            apk=$(find "$dir" -name "*-universal-release.apk" -type f | sort | head -n 1)
            echo "### Confused on which to download?"
            echo ""
            echo "If you're not sure, grab the recommended build below. It works on every device, no questions asked."
            echo ""
            echo "Requires **Android 10 (API 29)** or newer."
            echo ""
            echo "| Recommended | Variant | Min Android | Download | SHA256 |"
            echo "|:---|:---|:---|:---|:---|"
            if [ -n "$apk" ]; then
              name=$(basename "$apk")
              hash=$(sha256sum "$apk" | awk '{print $1}')
              url="https://github.com/IacobIonut01/ReFra/releases/download/${tag}/${name}"
              echo "| Best for most people | Standard (NoML) · Universal | Android 10 (API 29) | [Click Here](${url}) | \`${hash}\` |"
            else
              echo "| Best for most people | Standard (NoML) · Universal | Android 10 (API 29) | _Unavailable_ | |"
            fi
          }

          TAG="${{ needs.prepare.outputs.versionName }}"
          CHANGELOG="${VERSION}-changelog.txt"

          cat .github/RELEASE_BODY.md >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"
          cat .github/VARIANT_INFO.md >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"

          recommend_table "artifacts/maps" "$TAG" >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"

          echo "### Standard (NoML)" >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"
          generate_table "artifacts/maps" "$TAG" >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"

          echo "### Offline (NoML)" >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"
          generate_table "artifacts/offline" "$TAG" >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"

          echo "### Offline (WithML)" >> "$CHANGELOG"
          echo "" >> "$CHANGELOG"
          generate_table "artifacts/withml" "$TAG" >> "$CHANGELOG"
      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.VERSION }} Release
          body_path: ${{ env.VERSION }}-changelog.txt
          prerelease: false
          tag_name: ${{ needs.prepare.outputs.versionName }}
          files: |
            artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
